name: Review Agent

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

concurrency:
  group: agent-review-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'security-passed' &&
       contains(github.event.pull_request.labels.*.name, 'agent-pr'))
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 15
    env:
      ANTHROPIC_MODEL: au.anthropic.claude-sonnet-4-6
      PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Checkout PR branch (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HEAD_REF=$(gh pr view "$PR_NUM" --json headRefName -q .headRefName)
          git fetch origin "$HEAD_REF"
          git checkout "$HEAD_REF"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BEDROCK }}
          aws-region: ap-southeast-2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up non-root user for Claude Code
        run: |
          useradd -m agent
          chown -R agent:agent "$GITHUB_WORKSPACE"
          chown -R agent:agent /tmp
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Code review with Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          runuser -u agent -- claude -p \
            --model au.anthropic.claude-sonnet-4-6 \
            --max-turns 30 \
            --allow-dangerously-skip-permissions --dangerously-skip-permissions \
            "You are a code review agent reviewing PR #${PR_NUM}.

          ## Instructions
          1. Read CLAUDE.md if it exists for project conventions.
          2. Run \`git diff origin/master...HEAD\` to see all changes.
          3. Review for code quality, correctness, and adherence to project conventions.

          ## Check for:
          - **Correctness**: Logic errors, off-by-one, race conditions, missing edge cases
          - **Conventions**: Does it follow patterns in existing code?
          - **Code quality**: Duplication, unclear naming, unnecessary complexity
          - **Error handling**: Missing error handling at system boundaries
          - **Tests**: Are new features tested? Are existing tests still valid?
          - **Performance**: Unnecessary allocations, O(n^2) where O(n) would do

          ## Output
          Create a file called /tmp/review-report.md with your findings:
          - If APPROVED: Start with REVIEW_APPROVED on the first line, then brief positive notes.
          - If CHANGES NEEDED: Start with REVIEW_CHANGES_NEEDED on the first line, then specific, actionable feedback with file paths and line numbers.

          Be constructive. Only request changes for real issues, not style preferences."

      - name: Post review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -f /tmp/review-report.md ]; then
            REPORT=$(cat /tmp/review-report.md)
          else
            REPORT="Review agent completed but did not produce a report."
          fi

          gh pr comment "$PR_NUM" \
            --body "**Review Agent**

          $REPORT"

          if echo "$REPORT" | grep -q "REVIEW_APPROVED"; then
            gh pr edit "$PR_NUM" --add-label "review-approved"
            gh workflow run agent-merge.yml -f pr_number="$PR_NUM"
          else
            gh pr edit "$PR_NUM" --add-label "review-changes-needed"
            gh workflow run agent-revise.yml -f pr_number="$PR_NUM"
          fi
