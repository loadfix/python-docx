name: Developer Agent

on:
  issues:
    types: [labeled]

concurrency:
  group: agent-develop-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  develop:
    if: github.event.label.name == 'agent'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_MODEL: au.anthropic.claude-opus-4-6-v1
      CLAUDE_CODE_USE_BEDROCK: "1"

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install pytest lxml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Create feature branch
        run: |
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Write prompt file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/prompt.txt <<INSTRUCTIONS
          You are a developer agent working on the python-docx library fork.
          Implement the feature described below.

          ## Instructions
          1. Read CLAUDE.md for architecture patterns, test conventions, and commands.
          2. Study existing similar code before writing new code (e.g., read CommentsPart before writing FootnotesPart).
          3. Follow the three-layer pattern: oxml CT_ classes -> Part class -> proxy API.
          4. Register new CT_ elements in src/docx/oxml/__init__.py.
          5. Write tests following the Describe*/it_* BDD pattern in tests/.
          6. Run tests: pytest tests/ -x -v
          7. If tests fail, fix the issues and re-run (up to 3 attempts).
          8. Commit your changes with a descriptive message referencing issue #${ISSUE_NUMBER}.

          ## Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
          INSTRUCTIONS
          echo "" >> /tmp/prompt.txt
          echo "$ISSUE_BODY" >> /tmp/prompt.txt

      - name: Implement feature with Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          cat /tmp/prompt.txt | claude -p \
            --model au.anthropic.claude-opus-4-6-v1 \
            --max-turns 50 \
            --dangerously-skip-permissions

      - name: Push branch
        run: |
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
          git push --force origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "## Summary
          Implements #${ISSUE_NUMBER}

          This PR was automatically generated by the Developer Agent.

          ## Original Issue
          ${ISSUE_BODY}

          ---
          Generated by Developer Agent using Claude Code" \
            --head "$BRANCH" \
            --base master \
            --label "agent-pr"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_URL=$(gh pr view "$BRANCH" --json url -q .url)
          gh issue comment "$ISSUE_NUMBER" \
            --body "**Developer Agent** has created a PR: $PR_URL"
