name: Developer Agent

on:
  issues:
    types: [labeled]

concurrency:
  group: agent-develop-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  develop:
    if: github.event.label.name == 'agent'
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 45
    env:
      ANTHROPIC_MODEL: au.anthropic.claude-opus-4-6-v1
      CLAUDE_CODE_USE_BEDROCK: "1"

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Create feature branch
        run: |
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Write prompt file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/prompt.txt <<INSTRUCTIONS
          You are a developer agent. Implement the feature described below.

          ## Instructions
          1. Read CLAUDE.md if it exists for project conventions.
          2. Understand the existing codebase before making changes.
          3. Implement the feature with clean, production-quality code.
          4. Follow existing patterns and conventions in the codebase.
          5. Run tests: \`uv run pytest\`
          6. Run acceptance tests: \`uv run behave --stop\`
          7. If tests fail, fix the issues and re-run (up to 3 attempts).
          8. Commit your changes with a descriptive message referencing issue #${ISSUE_NUMBER}.

          ## Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
          INSTRUCTIONS
          echo "" >> /tmp/prompt.txt
          echo "$ISSUE_BODY" >> /tmp/prompt.txt

      - name: Implement feature with Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          # Create non-root user if running as root (self-hosted runners)
          if [ "$(id -u)" = "0" ]; then
            useradd -m agent 2>/dev/null || true
            cp -r /root/.aws /home/agent/.aws 2>/dev/null || true
            chown -R agent:agent . /tmp/prompt.txt /home/agent 2>/dev/null || true
            su agent -c "CLAUDE_CODE_USE_BEDROCK=1 AWS_REGION=$AWS_REGION AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN cat /tmp/prompt.txt | claude -p --model au.anthropic.claude-opus-4-6-v1 --max-turns 50 --dangerously-skip-permissions"
          else
            cat /tmp/prompt.txt | claude -p \
              --model au.anthropic.claude-opus-4-6-v1 \
              --max-turns 50 \
              --dangerously-skip-permissions
          fi

      - name: Push branch
        run: |
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
          git push --force origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "## Summary
          Implements #${ISSUE_NUMBER}

          This PR was automatically generated by the Developer Agent.

          ## Original Issue
          ${ISSUE_BODY}

          ---
          Generated by Developer Agent using Claude Code" \
            --head "$BRANCH" \
            --base master \
            --label "agent-pr"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_URL=$(gh pr view "$BRANCH" --json url -q .url)
          gh issue comment "$ISSUE_NUMBER" \
            --body "**Developer Agent** has created a PR: $PR_URL

          The security and review agents will now evaluate the changes."
