name: Product Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to review"
        required: true
        type: string

concurrency:
  group: agent-product-${{ github.event.inputs.issue_number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'agent' ||
      (github.event_name == 'issue_comment' &&
       !contains(github.event.comment.user.login, '[bot]') &&
       contains(toJSON(github.event.issue.labels), 'agent'))
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 15
    env:
      ANTHROPIC_MODEL: au.anthropic.claude-sonnet-4-6
      CLAUDE_CODE_USE_BEDROCK: "1"
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BEDROCK }}
          aws-region: ap-southeast-2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up non-root user for Claude Code
        run: |
          useradd -m agent
          chown -R agent:agent "$GITHUB_WORKSPACE"
          chown -R agent:agent /tmp
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch issue details
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue view "$ISSUE_NUMBER" --json title,body --jq '.title' > /tmp/issue-title.txt
          gh issue view "$ISSUE_NUMBER" --json title,body --jq '.body' > /tmp/issue-body.txt

          # Append recent comments so the Product Agent has full context
          COMMENT_COUNT=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments --jq 'length' 2>/dev/null || echo "0")
          if [ "$COMMENT_COUNT" -gt 0 ]; then
            echo "" >> /tmp/issue-body.txt
            echo "---" >> /tmp/issue-body.txt
            echo "## Discussion ($COMMENT_COUNT comments)" >> /tmp/issue-body.txt
            gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments \
              --jq '.[-10:] | .[] | "**@\(.user.login)** (\(.created_at[:10])):\n\(.body[:500])\n"' >> /tmp/issue-body.txt
          fi

      - name: Write prompt file
        run: |
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)
          ISSUE_BODY=$(cat /tmp/issue-body.txt)
          cat > /tmp/prompt.txt <<INSTRUCTIONS
          You are a Product Manager agent for python-docx — a Python library for creating, reading, and updating Microsoft Word (.docx) files programmatically. It provides a clean API for manipulating document elements like paragraphs, tables, styles, headers, and images.

          ## Product Context
          - Language: Python 3.9+, uses lxml for XML manipulation
          - Used as a dependency in Python applications (e.g., citation-style-converter backend)
          - Users: Python developers who need to generate or modify Word documents
          - Key features: document creation, paragraph/table/style manipulation, template filling
          - Forked from python-openxml/python-docx, MIT licence
          - Tests: pytest for unit tests, behave for acceptance tests

          ## Your Task
          Review the following issue and decide whether it should proceed to development.

          Evaluate:
          1. Is the issue clear and well-defined enough for a developer to implement?
          2. Does it align with the project's scope and purpose?
          3. Are there any missing details, edge cases, or risks that should be addressed first?

          Respond with EXACTLY one of these verdicts on the FIRST line of your output:
          - APPROVED — the issue is clear, scoped, and ready for development
          - NEEDS_CLARIFICATION — the issue needs more information before development
          - REJECTED — the issue is out of scope, a duplicate, or should not be implemented

          After the verdict, provide a brief explanation (2-4 sentences).

          ## Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
          INSTRUCTIONS
          echo "" >> /tmp/prompt.txt
          echo "$ISSUE_BODY" >> /tmp/prompt.txt

      - name: Review issue with Claude Code
        id: review
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          OUTPUT=$(runuser -u agent -- bash -c 'cat /tmp/prompt.txt | claude -p \
            --model au.anthropic.claude-sonnet-4-6 \
            --max-turns 100 \
            --dangerously-skip-permissions')
          echo "$OUTPUT" > /tmp/review-output.txt
          VERDICT=$(echo "$OUTPUT" | head -1 | tr -d '[:space:]')
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "Verdict: $VERDICT"

      - name: Handle APPROVED
        if: steps.review.outputs.verdict == 'APPROVED'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REVIEW=$(cat /tmp/review-output.txt)
          gh issue comment "$ISSUE_NUMBER" \
            --body "**Product Agent — APPROVED**

          $REVIEW

          Handing off to the Developer Agent."
          gh issue label add "$ISSUE_NUMBER" --label "product-approved"
          gh workflow run agent-develop.yml -f issue_number="$ISSUE_NUMBER"

      - name: Handle NEEDS_CLARIFICATION
        if: steps.review.outputs.verdict == 'NEEDS_CLARIFICATION'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REVIEW=$(cat /tmp/review-output.txt)
          gh issue comment "$ISSUE_NUMBER" \
            --body "**Product Agent — NEEDS CLARIFICATION**

          $REVIEW

          Please update the issue with the requested details and re-apply the \`agent\` label."
          gh issue label add "$ISSUE_NUMBER" --label "needs-clarification"

      - name: Handle REJECTED
        if: steps.review.outputs.verdict == 'REJECTED'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REVIEW=$(cat /tmp/review-output.txt)
          gh issue comment "$ISSUE_NUMBER" \
            --body "**Product Agent — REJECTED**

          $REVIEW"
          gh issue label add "$ISSUE_NUMBER" --label "product-rejected"
          gh issue label remove "$ISSUE_NUMBER" --label "agent"
