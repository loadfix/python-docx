name: Debug Agent

on:
  workflow_run:
    workflows: ["Developer Agent", "Security Agent", "Review Agent", "Revise Agent", "Merge Agent"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  debug:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 15
    env:
      ANTHROPIC_MODEL: au.anthropic.claude-sonnet-4-6
      CLAUDE_CODE_USE_BEDROCK: "1"

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BEDROCK }}
          aws-region: ap-southeast-2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Set up non-root user for Claude Code
        run: |
          useradd -m agent 2>/dev/null || true
          chown -R agent:agent /tmp

      - name: Collect failure context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "=== Failed Workflow ===" > /tmp/debug-context.txt
          echo "Workflow: $WORKFLOW_NAME" >> /tmp/debug-context.txt
          echo "Run ID: $RUN_ID" >> /tmp/debug-context.txt
          echo "URL: ${{ github.event.workflow_run.html_url }}" >> /tmp/debug-context.txt
          echo "" >> /tmp/debug-context.txt

          # Get the failed job logs
          echo "=== Failed Job Logs (last 200 lines) ===" >> /tmp/debug-context.txt
          gh run view "$RUN_ID" --log-failed 2>&1 | tail -200 >> /tmp/debug-context.txt

          # Get retry count from previous debug runs
          RETRY_COUNT=$(gh run list --workflow "Debug Agent" --json conclusion,createdAt \
            --jq "[.[] | select(.conclusion == \"success\")] | length" 2>/dev/null || echo "0")
          echo "RETRY_COUNT=$RETRY_COUNT" >> $GITHUB_ENV

          # Extract linked issue/PR number from the workflow run
          echo "=== Run Details ===" >> /tmp/debug-context.txt
          gh run view "$RUN_ID" --json headBranch,event -q '{branch: .headBranch, event: .event}' >> /tmp/debug-context.txt 2>/dev/null || true

      - name: Diagnose with Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          cat > /tmp/debug-prompt.txt <<PROMPT
          You are a debug agent. A GitHub Actions workflow has failed. Analyse the logs and classify the failure.

          ## Failed Workflow: $WORKFLOW_NAME (Run ID: $RUN_ID)

          ## Failure Logs
          $(cat /tmp/debug-context.txt)

          ## Instructions

          1. Read the failure logs carefully.
          2. Classify the error into ONE of these categories:
             - INFRA: Infrastructure/transient failure (OIDC token, runner crash, network timeout, permission denied)
             - TIMEOUT: The agent ran out of time or max turns
             - MODEL: LLM/Bedrock error (invalid model, rate limit, auth failure)
             - PROMPT: Prompt too long, argument list too long, shell escaping issues
             - CODE: Test failure, build error, lint error in the agent's generated code
             - UNKNOWN: Cannot determine

          3. Write your diagnosis to /tmp/diagnosis.json in this exact format:
             {
               "category": "INFRA|TIMEOUT|MODEL|PROMPT|CODE|UNKNOWN",
               "summary": "One-line summary of the failure",
               "details": "Detailed explanation of what went wrong",
               "retryable": true/false,
               "suggested_fix": "What to do about it (if not retryable)"
             }

          Only create the JSON file. Do not modify any code or create PRs.
          PROMPT

          runuser -u agent -- bash -c 'cat /tmp/debug-prompt.txt | claude -p \
            --model au.anthropic.claude-sonnet-4-6 \
            --max-turns 5 \
            --dangerously-skip-permissions' 2>/dev/null || \
          cat /tmp/debug-prompt.txt | claude -p \
            --model au.anthropic.claude-sonnet-4-6 \
            --max-turns 5 \
            --allow-dangerously-skip-permissions \
            --allow-dangerously-skip-permissions --dangerously-skip-permissions

      - name: Process diagnosis and take action
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          if [ ! -f /tmp/diagnosis.json ]; then
            echo "No diagnosis produced"
            exit 0
          fi

          CATEGORY=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('category','UNKNOWN'))" < /tmp/diagnosis.json 2>/dev/null || echo "UNKNOWN")
          SUMMARY=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('summary','Analysis failed'))" < /tmp/diagnosis.json 2>/dev/null || echo "Analysis failed")
          DETAILS=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('details',''))" < /tmp/diagnosis.json 2>/dev/null || echo "")
          FIX=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('suggested_fix',''))" < /tmp/diagnosis.json 2>/dev/null || echo "")

          echo "Category: $CATEGORY"
          echo "Summary: $SUMMARY"

          # Extract issue number and PR number from the failed run
          BRANCH=$(gh run view "$RUN_ID" --json headBranch -q .headBranch 2>/dev/null || echo "")
          ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' || echo "")
          PR_NUM=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || echo "")

          # Count how many times the debug agent has acted on this issue
          DEBUG_COUNT=0
          if [ -n "$ISSUE_NUM" ]; then
            DEBUG_COUNT=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUM/comments \
              --jq '[.[] | select(.body | startswith("**Debug Agent**"))] | length' 2>/dev/null || echo "0")
          fi
          echo "Debug interventions so far: $DEBUG_COUNT"

          # Post diagnosis comment
          TARGET="$ISSUE_NUM"
          [ -z "$TARGET" ] && TARGET="$PR_NUM"
          if [ -n "$TARGET" ]; then
            gh issue comment "$TARGET" --body "**Debug Agent** — \`$WORKFLOW_NAME\` failed (intervention $((DEBUG_COUNT + 1))/5)

          **Category:** $CATEGORY
          **Summary:** $SUMMARY
          $DETAILS
          **Action:** $(
            if [ "$DEBUG_COUNT" -ge 5 ]; then
              echo "Max interventions reached. Requesting human review."
            elif [ "$CATEGORY" = "TIMEOUT" ]; then
              echo "Re-dispatching developer agent to continue work."
            elif [ "$CATEGORY" = "CODE" ]; then
              echo "Re-dispatching developer agent with error context."
            elif [ "$CATEGORY" = "INFRA" ] || [ "$CATEGORY" = "MODEL" ]; then
              echo "Retrying the failed workflow."
            else
              echo "Requesting human review."
            fi
          )" 2>/dev/null || true
          fi

          # Stop after 5 interventions on the same issue
          if [ "$DEBUG_COUNT" -ge 5 ]; then
            echo "Max debug interventions reached"
            [ -n "$ISSUE_NUM" ] && gh issue edit "$ISSUE_NUM" --add-label "needs-human-review" 2>/dev/null || true
            exit 0
          fi

          # Take action based on category and which workflow failed
          case "$CATEGORY" in
            INFRA|MODEL)
              echo "Retrying failed run..."
              gh run rerun "$RUN_ID" --failed 2>/dev/null || true
              ;;
            TIMEOUT)
              # Agent ran out of turns — re-dispatch to continue where it left off
              if echo "$WORKFLOW_NAME" | grep -qi "Developer"; then
                [ -n "$ISSUE_NUM" ] && echo "Re-dispatching Developer Agent..." && \
                  GH_TOKEN=${{ github.token }} gh workflow run agent-develop.yml -f issue_number="$ISSUE_NUM" 2>/dev/null || true
              elif echo "$WORKFLOW_NAME" | grep -qi "Revise"; then
                [ -n "$PR_NUM" ] && echo "Re-dispatching Revise Agent..." && \
                  GH_TOKEN=${{ github.token }} gh workflow run agent-revise.yml -f pr_number="$PR_NUM" 2>/dev/null || true
              elif echo "$WORKFLOW_NAME" | grep -qi "Security"; then
                [ -n "$PR_NUM" ] && echo "Re-dispatching Security Agent..." && \
                  GH_TOKEN=${{ github.token }} gh workflow run agent-security.yml -f pr_number="$PR_NUM" 2>/dev/null || true
              elif echo "$WORKFLOW_NAME" | grep -qi "Review"; then
                [ -n "$PR_NUM" ] && echo "Re-dispatching Review Agent..." && \
                  GH_TOKEN=${{ github.token }} gh workflow run agent-review.yml -f pr_number="$PR_NUM" 2>/dev/null || true
              else
                gh run rerun "$RUN_ID" --failed 2>/dev/null || true
              fi
              ;;
            CODE|PROMPT)
              # Code or prompt issue — re-dispatch the developer/revise agent
              # The existing branch has partial work; the agent will continue from there
              if echo "$WORKFLOW_NAME" | grep -qi "Developer"; then
                [ -n "$ISSUE_NUM" ] && echo "Re-dispatching Developer Agent with error context..." && \
                  GH_TOKEN=${{ github.token }} gh workflow run agent-develop.yml -f issue_number="$ISSUE_NUM" 2>/dev/null || true
              elif echo "$WORKFLOW_NAME" | grep -qi "Revise"; then
                [ -n "$PR_NUM" ] && echo "Re-dispatching Revise Agent..." && \
                  GH_TOKEN=${{ github.token }} gh workflow run agent-revise.yml -f pr_number="$PR_NUM" 2>/dev/null || true
              elif echo "$WORKFLOW_NAME" | grep -qi "Security"; then
                # Security agent code failure is unusual — retry
                [ -n "$PR_NUM" ] && GH_TOKEN=${{ github.token }} gh workflow run agent-security.yml -f pr_number="$PR_NUM" 2>/dev/null || true
              else
                gh run rerun "$RUN_ID" --failed 2>/dev/null || true
              fi
              ;;
            *)
              # Unknown — try a simple retry first, then human review
              if [ "$DEBUG_COUNT" -lt 2 ]; then
                gh run rerun "$RUN_ID" --failed 2>/dev/null || true
              else
                [ -n "$ISSUE_NUM" ] && gh issue edit "$ISSUE_NUM" --add-label "needs-human-review" 2>/dev/null || true
              fi
              ;;
          esac
