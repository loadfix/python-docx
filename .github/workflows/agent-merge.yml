name: Merge Agent

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: string

concurrency:
  group: agent-merge-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  merge:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'review-approved' &&
       contains(github.event.pull_request.labels.*.name, 'agent-pr'))
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 10
    env:
      PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "$PR_NUM" \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

      - name: Close linked issue and trigger dependents
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ISSUE_NUM=$(gh pr view "$PR_NUM" \
            --repo ${{ github.repository }} \
            --json body -q .body | grep -oP 'Implements #\K\d+' | head -1)
          if [ -n "$ISSUE_NUM" ]; then
            gh issue close "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --comment "**Merge Agent**: PR #${PR_NUM} merged."

            # Check for dependent issues that reference this issue number
            # Handles patterns: "Depends on #3", "Depends on #1-#3", "Depends on: #3", "#3 (closed)"
            python3 << 'PYEOF'
import json, subprocess, re, sys

repo = "${{ github.repository }}"
closed_num = int("${ISSUE_NUM}")

# Get all open issues
result = subprocess.run(
    ["gh", "issue", "list", "--repo", repo, "--state", "open", "--limit", "100",
     "--json", "number,body,title"],
    capture_output=True, text=True
)
issues = json.loads(result.stdout) if result.returncode == 0 else []

for issue in issues:
    body = issue.get("body", "") or ""
    num = issue["number"]

    # Find all issue numbers referenced in dependency context
    # Match: "Depends on #N", "Depends on: #N", "Depends on #N-#M", "#N (table/CDK/etc must exist)"
    dep_refs = set()
    for m in re.finditer(r'[Dd]epends?\s+on[:\s]*#(\d+)', body):
        dep_refs.add(int(m.group(1)))
    # Also match range patterns like "#1-#3" near "depends"
    for m in re.finditer(r'[Dd]epends?\s+on[:\s]*#(\d+)\s*[-–]\s*#?(\d+)', body):
        start, end = int(m.group(1)), int(m.group(2))
        for i in range(start, end + 1):
            dep_refs.add(i)
    # Also match "#N (description)" patterns after "Depends on"
    for m in re.finditer(r'[Dd]epends?\s+on[:\s]*(?:#\d+[^#]*)*#(\d+)', body):
        dep_refs.add(int(m.group(1)))

    if closed_num not in dep_refs:
        continue

    print(f"Issue #{num} references #{closed_num} as dependency")

    # Check if ALL referenced deps are closed
    all_resolved = True
    for dep in dep_refs:
        r = subprocess.run(
            ["gh", "issue", "view", str(dep), "--repo", repo, "--json", "state", "-q", ".state"],
            capture_output=True, text=True
        )
        if r.stdout.strip() != "CLOSED":
            print(f"  #{dep} still open — not ready")
            all_resolved = False
            break

    if all_resolved:
        print(f"  All deps resolved — dispatching developer agent for #{num}")
        subprocess.run(
            ["gh", "workflow", "run", "agent-develop.yml", "--repo", repo, "-f", f"issue_number={num}"],
        )
PYEOF
          fi
