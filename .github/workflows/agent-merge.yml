name: Merge Agent

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: string

concurrency:
  group: agent-merge-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  merge:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'review-approved' &&
       contains(github.event.pull_request.labels.*.name, 'agent-pr'))
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 10
    env:
      PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "$PR_NUM" \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

      - name: Close linked issue and trigger dependents
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ISSUE_NUM=$(gh pr view "$PR_NUM" \
            --repo ${{ github.repository }} \
            --json body -q .body | grep -oP 'Implements #\K\d+' | head -1)
          if [ -n "$ISSUE_NUM" ]; then
            gh issue close "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --comment "**Merge Agent**: PR #${PR_NUM} merged."

            # Check for dependent issues that were waiting on this one
            gh issue list --repo ${{ github.repository }} --state open --json number,body --jq '.[]' | while read -r ISSUE_JSON; do
              DEP_NUM=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['number'])")
              DEP_BODY=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
              if echo "$DEP_BODY" | grep -qP "Depends on #${ISSUE_NUM}\b"; then
                echo "Issue #${DEP_NUM} depends on #${ISSUE_NUM} — checking if all deps resolved"
                # Check if all "Depends on #N" references are now closed
                ALL_RESOLVED=true
                for DEP in $(echo "$DEP_BODY" | grep -oP 'Depends on #\K\d+'); do
                  STATE=$(gh issue view "$DEP" --repo ${{ github.repository }} --json state -q .state)
                  if [ "$STATE" != "CLOSED" ]; then
                    ALL_RESOLVED=false
                    break
                  fi
                done
                if [ "$ALL_RESOLVED" = "true" ]; then
                  echo "All dependencies resolved for #${DEP_NUM} — triggering agent"
                  gh issue edit "$DEP_NUM" --repo ${{ github.repository }} --add-label "agent"
                fi
              fi
            done
          fi
