name: Merge Agent

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: string

concurrency:
  group: agent-merge-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  merge:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'review-approved' &&
       contains(github.event.pull_request.labels.*.name, 'agent-pr'))
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 10
    env:
      PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "$PR_NUM" \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

      - name: Close linked issue and trigger dependents
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ISSUE_NUM=$(gh pr view "$PR_NUM" \
            --repo ${{ github.repository }} \
            --json body -q .body | grep -oP 'Implements #\K\d+' | head -1)
          if [ -n "$ISSUE_NUM" ]; then
            gh issue close "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --comment "**Merge Agent**: PR #${PR_NUM} merged."

            # Check for dependent issues and trigger them if all deps resolved
            OPEN_ISSUES=$(gh issue list --repo ${{ github.repository }} --state open --limit 100 --json number,body -q '.[]')
            echo "$OPEN_ISSUES" | python3 -c "
          import json, subprocess, re, sys
          repo = '${{ github.repository }}'
          closed_num = int('${ISSUE_NUM}')
          for line in sys.stdin:
            line = line.strip()
            if not line: continue
            issue = json.loads(line)
            body = issue.get('body', '') or ''
            num = issue['number']
            dep_refs = set()
            for m in re.finditer(r'[Dd]epends?\s+on[:\s]*#(\d+)', body):
              dep_refs.add(int(m.group(1)))
            for m in re.finditer(r'[Dd]epends?\s+on[:\s]*#(\d+)\s*[-]+\s*#?(\d+)', body):
              for i in range(int(m.group(1)), int(m.group(2)) + 1):
                dep_refs.add(i)
            if closed_num not in dep_refs: continue
            print(f'Issue #{num} depends on #{closed_num}')
            all_ok = True
            for d in dep_refs:
              r = subprocess.run(['gh','issue','view',str(d),'--repo',repo,'--json','state','-q','.state'], capture_output=True, text=True)
              if r.stdout.strip() != 'CLOSED':
                print(f'  #{d} still open'); all_ok = False; break
            if all_ok:
              print(f'  All deps resolved — dispatching #{num}')
              subprocess.run(['gh','workflow','run','agent-develop.yml','--repo',repo,'-f',f'issue_number={num}'])
          " || true
          fi
