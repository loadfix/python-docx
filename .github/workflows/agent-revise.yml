name: Revise Agent

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to revise"
        required: true
        type: string

concurrency:
  group: agent-revise-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: write
  id-token: write

jobs:
  revise:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.pull_request.labels.*.name, 'agent-pr') &&
       (github.event.label.name == 'security-failed' || github.event.label.name == 'review-changes-needed'))
    runs-on:
      - codebuild-github-runner-python-docx-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 45
    env:
      ANTHROPIC_MODEL: au.anthropic.claude-opus-4-6-v1
      PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check revision count
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REVISION_COUNT=$(gh api repos/${{ github.repository }}/issues/${PR_NUM}/comments \
            --jq '[.[] | select(.body | startswith("**Review Agent**")) | select(.body | contains("REVIEW_CHANGES_NEEDED"))] | length')
          if [ "$REVISION_COUNT" -gt 2 ]; then
            gh pr comment "$PR_NUM" \
              --body "**Revise Agent**: Maximum revision cycles (2) reached. Requesting human review."
            gh pr edit "$PR_NUM" --add-label "needs-human-review"
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout PR branch (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HEAD_REF=$(gh pr view "$PR_NUM" --json headRefName -q .headRefName)
          git fetch origin "$HEAD_REF"
          git checkout "$HEAD_REF"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Get review feedback
        id: feedback
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FEEDBACK=$(gh api repos/${{ github.repository }}/issues/${PR_NUM}/comments \
            --jq '[.[] | select(.body | startswith("**Review Agent**") or startswith("**Security Agent"))] | last | .body')
          echo "FEEDBACK<<FEEDBACKEOF" >> $GITHUB_OUTPUT
          echo "$FEEDBACK" >> $GITHUB_OUTPUT
          echo "FEEDBACKEOF" >> $GITHUB_OUTPUT

      - name: Set up non-root user for Claude Code
        run: |
          useradd -m agent
          chown -R agent:agent "$GITHUB_WORKSPACE"
          chown -R agent:agent /tmp
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Fix issues with Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          FEEDBACK: ${{ steps.feedback.outputs.FEEDBACK }}
        run: |
          runuser -u agent -- claude -p \
            --model au.anthropic.claude-opus-4-6-v1 \
            --max-turns 200 \
            --allow-dangerously-skip-permissions --dangerously-skip-permissions \
            "You are a developer agent fixing issues raised during code review of PR #${PR_NUM}.

          ## Review Feedback
          $FEEDBACK

          ## Instructions
          1. Read CLAUDE.md if it exists for project conventions.
          2. Read the review feedback carefully.
          3. Fix each issue raised by the reviewers.
          4. Run tests: \`uv run pytest\`
          5. Run acceptance tests: \`uv run behave --stop\`
          6. Commit your fixes with a message like \"fix: address review feedback\""

      - name: Push fixes
        run: |
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
          git checkout -- .github/workflows/ 2>/dev/null || true
          git push origin HEAD

      - name: Reset labels and re-trigger security
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr edit "$PR_NUM" \
            --remove-label "security-failed" \
            --remove-label "review-changes-needed" \
            --remove-label "security-passed" \
            --remove-label "review-approved" 2>/dev/null || true
          GH_TOKEN=${{ github.token }} gh workflow run agent-security.yml -f pr_number="$PR_NUM"
